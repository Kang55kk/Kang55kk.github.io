      const CreateComet = function () {
        this.node = document.createElement("div");
        let x = 0;
        let y = 60;
        let deg = rdm(185, 210);
        // let deg = 200;
        let opc = 1;
        $(this.node).addClass("comet");
        $(".starbgr").append(this.node);
        $(this.node).css({
          transform: `rotate(${deg}deg)`,
          opacity: 1,
        });
        setInterval(() => {
          x += 10;
          y += 10 * Math.tan((deg / 360) * 2 * Math.PI);
          opc -= 0.005;
          $(this.node).css({
            left: x,
            top: y,
            opacity: opc,
          });
        }, 16);
        setTimeout(() => {
          $(this.node).remove();
        }, 5000);
      };
      const CreateComet2 = function () {
        this.node = document.createElement("div");
        let x = 0;
        // let y = rdm(20, 40);
        let y = 30;
        let deg = rdm(-30, -10);
        // let deg = 200;
        let opc = 1;
        $(this.node).addClass("comet");
        $(".starbgr").append(this.node);
        $(this.node).css({
          transform: `rotate(${deg}deg)`,
          opacity: 1,
        });
        setInterval(() => {
          x += 10;
          y += 10 * Math.tan((deg / 360) * 2 * Math.PI);
          opc -= 0.005;
          $(this.node).css({
            right: x,
            top: -y,
            opacity: opc,
          });
        }, 16);
        setTimeout(() => {
          $(this.node).remove();
        }, 5000);
      };
